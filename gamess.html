<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dodge the Obstacles Game</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-window-wrap">
      <section class="card">
        <h1>Dodge the Obstacles</h1>v3y4

        <button id="backBtn">Back to Settings</button>

        <div class="button-row">
          <button id="startBtn" type="button">Start Game</button>
          <button id="pauseBtn" type="button">Pause / Resume</button>
          <button id="saveBtn" type="button">Save Session</button>
          <button id="loadBtn" type="button">Load Session</button>
          <button id="resetBtn" type="button">Reset Game</button>
          <button id="backBtn" type="button">Back to Settings</button>
        </div>

        <div class="stats-grid game-stats-grid">
          <div class="stat-box">
            <span class="label">Player</span>
            <span id="displayPlayer">-</span>
          </div>
          <div class="stat-box">
            <span class="label">Score</span>
            <span id="displayScore">0</span>
          </div>
          <div class="stat-box">
            <span class="label">Lives</span>
            <span id="displayLives">3</span>
          </div>
          <div class="stat-box">
            <span class="label">Dodged</span>
            <span id="displayDodged">0</span>
          </div>
          <div class="stat-box">
            <span class="label">Bonuses</span>
            <span id="displayBonuses">0</span>
          </div>
          <div class="stat-box">
            <span class="label">Time Left</span>
            <span id="displayTimeLeft">0 s</span>
          </div>
        </div>
      </section>

      <section class="card">
        <div id="messageArea" class="message-area">
          Click Start Game when ready.
        </div>
      </section>

      <section class="card">
        <div id="gameArea">
          <div id="player"></div>
          <div id="roadMarkings"></div>
        </div>
      </section>

      <section class="card">
        <h2>Game Log</h2>
        <div id="logArea" class="log-area"></div>
      </section>
    </main>

    <script src="gamesss.js"></script>
  </body>
</html>
